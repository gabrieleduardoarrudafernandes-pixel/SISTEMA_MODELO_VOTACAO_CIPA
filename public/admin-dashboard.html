<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo - Sistema de Votação Ônix</title>
    <link rel="icon" type="image/jpeg" href="cipa.jpg">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Custom split layout for dashboard */
        .main-container.admin-split {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        /* Admin Dashboard - Match votacao.html styling */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #eee;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 800;
            color: var(--primary-teal-dark);
        }

        .stat-label {
            color: #666;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-admin {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-admin-primary {
            background: var(--primary-teal-dark);
            color: white;
        }

        .btn-admin-primary:hover {
            background: #003333;
        }

        .btn-admin-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-admin-danger {
            background: var(--admin-red);
            color: white;
        }

        /* Ensure form controls match light theme */
        .form-control {
            background: #fff;
            color: #333;
        }
    </style>
</head>

<body class="dashboard-page">

    <!-- Navbar - Matching votacao.html structure -->
    <div class="navbar">
        <div class="nav-left">
            <a href="#" class="site-logo">
                <img src="/4.jpg" alt="Logo" style="height: 40px; border-radius: 6px;">
            </a>
        </div>
        <div class="nav-right">
            <div class="user-profile">
                <div class="user-welcome" style="margin-right: 5px; font-weight: 400; font-size: 0.9em; color: #666;">
                    Administrador</div>
                <div class="user-name">Painel de Controle</div>
            </div>
            <button class="btn-logout" onclick="logout()">SAIR</button>
        </div>
    </div>

    <div class="main-container admin-split">

        <!-- Left Column: Register Form -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Cadastrar Novo Candidato</h2>
            </div>

            <div id="message" class="message"></div>

            <form id="candidateForm">
                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" name="nomfun" placeholder="Nome Completo" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Matrícula</label>
                    <input type="text" class="form-control" name="numcad" placeholder="Matrícula" required>
                </div>

                <div class="form-group">
                    <label class="form-label">CPF (Opcional)</label>
                    <input type="text" class="form-control" name="numcpf" id="numcpf" placeholder="000.000.000-00">
                </div>

                <div class="form-group">
                    <label class="form-label">Foto do Candidato</label>
                    <div class="file-upload" onclick="document.getElementById('foto').click()">
                        <input type="file" id="foto" name="foto" style="display: none" accept="image/*">
                        <span id="fileName">Escolher arquivo...</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-full btn-dark-teal">Salvar Candidato</button>
            </form>
        </div>

        <!-- Right Column: Candidates List -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Candidatos Cadastrados</h2>
            </div>

            <div class="table-container">
                <div id="loading" style="text-align: center; padding: 20px; color: #ffffff;">Carregando...</div>
                <table id="candidatesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Matrícula</th>
                            <th>Votos</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="candidatesBody">
                        <!-- Rows generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // File Input Handler
        document.getElementById('foto').addEventListener('change', function (e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : 'Escolher arquivo...';
            document.getElementById('fileName').textContent = fileName;
        });

        // Show Message Helper
        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }

        // Load Candidates
        async function loadCandidates() {
            try {
                const response = await fetch('/api/admin/candidates');
                const candidates = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('candidatesTable').style.display = 'table';

                const tbody = document.getElementById('candidatesBody');
                tbody.innerHTML = '';

                candidates.forEach(c => {
                    if (c.numcad === 'NULO') return; // Skip NULO in this list

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${c.nomfun}</td>
                        <td>${c.numcad}</td>
                        <td>${c.voto}</td>
                        <td>
                            <button class="action-btn" title="Editar">📝</button>
                            <button class="action-btn delete" onclick="deleteCandidate('${c.numcad}')" title="Excluir">🗑️</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error loading candidates:', error);
                document.getElementById('loading').textContent = 'Erro ao carregar dados.';
            }
        }

        // Register Candidate
        document.getElementById('candidateForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(e.target);

            const data = {
                numcad: formData.get('numcad'),
                nomfun: formData.get('nomfun'),
                numcpf: formData.get('numcpf').replace(/\D/g, '')
            };

            try {
                const response = await fetch('/api/admin/candidates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('Candidato salvo com sucesso!');
                    e.target.reset();
                    document.getElementById('fileName').textContent = 'Escolher arquivo...';
                    loadCandidates();
                } else {
                    showMessage(result.error || 'Erro ao salvar', 'error');
                }
            } catch (error) {
                console.error(error);
                showMessage('Erro de conexão', 'error');
            }
        });

        // Delete Candidate (Stub)
        async function deleteCandidate(id) {
            if (confirm('Tem certeza que deseja excluir este candidato?')) {
                // Implementation would go here calling DELETE API
                console.log('Delete', id);
                // For now just reload to simulate or implement if API exists
                // await fetch('/api/admin/candidates/' + id, { method: 'DELETE' });
                // loadCandidates();
            }
        }

        // Logout
        async function logout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            window.location.href = '/admin';
        }

        // Mask CPF
        document.getElementById('numcpf').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });

        // Init
        loadCandidates();
    </script>
</body>

</html>
