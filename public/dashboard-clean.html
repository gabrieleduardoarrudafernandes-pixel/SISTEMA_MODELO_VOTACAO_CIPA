<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Sistema de Votação CIPA</title>
    <link rel="icon" type="image/jpeg" href="cipa.jpg">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* FORÇAR FUNDO 100% BRANCO - IGUAL À PÁGINA DE VOTAÇÃO */
        * {
            background-color: #ffffff !important;
            background-image: none !important;
            box-shadow: none !important;
            box-sizing: border-box;
        }

        html,
        body {
            background: #ffffff !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh;
            color: #333333 !important;
        }

        /* NAVBAR BRANCO IGUAL À VOTAÇÃO */
        .navbar {
            background: #ffffff !important;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* LOGO ESTILO VOTAÇÃO */
        .onix-logo-small {
            color: #333333 !important;
            text-decoration: none;
            font-size: 1.5em;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        /* PERFIL DE USUÁRIO BRANCO */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-welcome,
        .user-name {
            color: #666666 !important;
        }

        /* BOTÃO DE LOGOUT */
        .btn-logout {
            background: transparent !important;
            color: #666666 !important;
            border: 1px solid #e0e0e0 !important;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-logout:hover {
            background: #f5f5f5 !important;
        }

        /* CONTAINER PRINCIPAL BRANCO */
        .main-container {
            background: #ffffff !important;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* CARDS BRANCOS SIMPLES */
        .card {
            background: #ffffff !important;
            border: 1px solid #e0e0e0 !important;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            color: #333333 !important;
        }

        /* TÍTULOS PRETOS */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: #333333 !important;
            margin-bottom: 20px;
        }

        /* FORMULÁRIOS BRANCOS */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333333 !important;
        }

        .form-group input {
            background: #ffffff !important;
            border: 1px solid #ddd !important;
            color: #333333 !important;
            padding: 12px;
            border-radius: 4px;
            width: 100%;
            font-size: 14px;
        }

        /* BOTÕES BRANCOS */
        .btn {
            background: #ffffff !important;
            color: #333333 !important;
            border: 2px solid #333333 !important;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #f5f5f5 !important;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* TABELAS BRANCAS */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff !important;
        }

        th {
            background: #f5f5f5 !important;
            color: #333333 !important;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            background: #ffffff !important;
            color: #333333 !important;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        /* STATS CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #ffffff !important;
            border: 1px solid #e0e0e0 !important;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #333333 !important;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666666 !important;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        /* MESSAGE */
        .message {
            background: #ffffff !important;
            color: #333333 !important;
            border: 1px solid #e0e0e0 !important;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error {
            border-left: 4px solid #e74c3c !important;
        }

        .warning {
            border-left: 4px solid #f39c12 !important;
        }

        /* ACTIONS */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Remover qualquer elemento com cor diferente de branco */
        .header,
        .vote-badge,
        .status-badge,
        .loading,
        *:hover,
        *:focus {
            background: #ffffff !important;
            color: #333333 !important;
            border-color: #e0e0e0 !important;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="nav-left">
            <a href="#" class="site-logo">
                <img src="/4.jpg" alt="Logo" style="height: 40px; border-radius: 6px;">
            </a>
        </div>
        <div class="nav-right">
            <div class="user-profile">
                <div class="user-welcome">Bem-vindo,</div>
                <div class="user-name">ADMIN</div>
            </div>
            <button class="btn-logout" onclick="logout()">SAIR</button>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <h2>➕ Cadastrar Novo Candidato</h2>

            <div id="message" class="message"></div>

            <form id="candidateForm">
                <div class="form-group">
                    <label for="numcad">🏢 NUMCAD (Matrícula) *</label>
                    <input type="text" id="numcad" name="numcad" required
                        placeholder="Digite a matrícula do colaborador..." autocomplete="off">
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="nomfun">👤 Nome Completo *</label>
                        <input type="text" id="nomfun" name="nomfun" required
                            placeholder="Nome completo do colaborador">
                    </div>

                    <div class="form-group">
                        <label for="cargo">💼 Cargo</label>
                        <input type="text" id="cargo" name="cargo" placeholder="Cargo do colaborador">
                    </div>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    🚀 Cadastrar Candidato
                </button>

                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <button type="button" class="btn" onclick="clearForm()" style="flex: 1;">
                        🔄 Limpar Formulário
                    </button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>📊 Candidatos Cadastrados</h2>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalCandidates">0</div>
                    <div class="stat-label">Total Candidatos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalVotes">0</div>
                    <div class="stat-label">Total Votos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeCandidates">0</div>
                    <div class="stat-label">Candidatos Ativos</div>
                </div>
            </div>

            <div class="quick-actions">
                <button class="btn" onclick="loadCandidates()">🔄 Atualizar</button>
                <button class="btn" onclick="clearForm()">🗑️ Limpar</button>
            </div>

            <div id="loading" class="loading">Carregando candidatos...</div>

            <table id="candidatesTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Votos</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="candidatesBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let candidates = [];

        // Mostrar mensagem
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message';
            if (type === 'error') {
                messageEl.className = 'message error';
            } else if (type === 'warning') {
                messageEl.className = 'message warning';
            }
            messageEl.style.display = 'block';

            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        // Limpar formulário
        function clearForm() {
            document.getElementById('candidateForm').reset();
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').style.opacity = '1';
            document.getElementById('numcad').focus();
        }

        // Carregar candidatos
        async function loadCandidates() {
            try {
                const response = await fetch('/api/admin/candidatos');
                candidates = await response.json();

                document.getElementById('loading').style.display = 'none';
                const table = document.getElementById('candidatesTable');
                table.style.display = 'table';

                const tbody = document.getElementById('candidatesBody');
                tbody.innerHTML = '';

                if (candidates.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px;">Nenhum candidato cadastrado</td></tr>';
                    updateStats([]);
                    return;
                }

                candidates.forEach(candidate => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${candidate.numcad}</strong></td>
                        <td>${candidate.nomfun}</td>
                        <td>${candidate.titcar || '-'}</td>
                        <td>${candidate.voto || 0}</td>
                        <td><span style="color: #2ecc71;">✅ Ativo</span></td>
                        <td>
                            <button class="btn" onclick="deleteCandidate('${candidate.numcad}', '${candidate.nomfun.replace(/'/g, "\\'")}')">
                                🗑️ Excluir
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                updateStats(candidates);

            } catch (error) {
                console.error('Erro ao carregar candidatos:', error);
                document.getElementById('loading').innerHTML = 'Erro ao carregar candidatos. Tente novamente.';
                updateStats([]);
            }
        }

        // Atualizar estatísticas
        function updateStats(candidates) {
            const total = candidates.length;
            const totalVotes = candidates.reduce((sum, c) => sum + c.voto, 0);
            const active = candidates.filter(c => c.ativo === 'S').length;

            document.getElementById('totalCandidates').textContent = total;
            document.getElementById('totalVotes').textContent = totalVotes;
            document.getElementById('activeCandidates').textContent = active;
        }

        // Cadastrar candidato
        document.getElementById('candidateForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(e.target);
            const data = {
                numcad: formData.get('numcad').trim(),
                nomfun: formData.get('nomfun').trim(),
                titcar: formData.get('cargo').trim()
            };

            if (!data.numcad || !data.nomfun) {
                showMessage('Matrícula e nome são obrigatórios', 'error');
                return;
            }

            try {
                const response = await fetch('/api/admin/candidates', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('✅ Candidato cadastrado com sucesso!', 'success');
                    clearForm();
                    loadCandidates(); // Atualizar lista
                } else {
                    showMessage('❌ ' + (result.error || 'Erro ao cadastrar candidato'), 'error');
                }
            } catch (error) {
                console.error('Erro ao cadastrar candidato:', error);
                showMessage('❌ Erro ao cadastrar candidato. Tente novamente.', 'error');
            }
        });

        // Excluir candidato
        async function deleteCandidate(numcad, nomfun) {
            if (!confirm(`Tem certeza que deseja excluir o candidato ${nomfun} (Matrícula: ${numcad})?`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/candidates/${numcad}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showMessage(`✅ Candidato excluído com sucesso!`, 'success');
                    loadCandidates(); // Atualizar lista
                } else {
                    showMessage(`❌ ${result.error || 'Erro ao excluir candidato'}`, 'error');
                }
            } catch (error) {
                console.error('Erro ao excluir candidato:', error);
                showMessage('❌ Erro ao excluir candidato. Tente novamente.', 'error');
            }
        }

        // Logout
        async function logout() {
            if (confirm('Tem certeza que deseja sair do painel administrativo?')) {
                try {
                    await fetch('/api/admin/logout', { method: 'POST' });
                    window.location.href = '/admin';
                } catch (error) {
                    console.error('Erro ao fazer logout:', error);
                    window.location.href = '/admin';
                }
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function () {
            loadCandidates();
            // Foco no primeiro campo
            document.getElementById('numcad').focus();
        });

        // Limpar mensagens ao digitar
        ['numcad', 'nomfun', 'cargo'].forEach(id => {
            document.getElementById(id).addEventListener('input', function () {
                document.getElementById('message').style.display = 'none';
            });
        });
    </script>
</body>

</html>
