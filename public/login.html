<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Votação Ônix</title>
    <link rel="icon" type="image/jpeg" href="cipa.jpg">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page bg-eleitor">
    <div class="login-wrapper">
        <!-- Logo no topo, fora do card -->
        <div class="login-logo-top">
            <img src="/4.jpg" alt="Logo Ônix">
        </div>

        <div class="login-card">
            <h2 class="title-text">Sistema de Votação Ônix</h2>
            <p class="subtitle-text">Bem-vindo! Faça login para acessar o painel.</p>

            <div id="message" class="message"></div>

            <form id="loginForm">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="cpf" name="cpf" class="form-input focus-teal"
                        placeholder="CPF" maxlength="14" required autocomplete="username"
                        oninput="formatarCPF(this)">
                </div>

                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="senha" name="senha" class="form-input focus-teal" placeholder="Senha"
                        required autocomplete="current-password">
                    <span class="password-toggle" onclick="togglePassword()">👁️</span>
                </div>

                <div class="forgot-password">
                    <a href="#">Esqueceu sua senha?</a>
                </div>

                <button type="submit" class="btn btn-full btn-teal" id="loginBtn">
                    ACESSAR PAINEL
                </button>
            </form>

            <div class="footer-link">
                <a href="/admin">→ Acesso para Administradores</a>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('senha');
            const toggleIcon = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈'; // Closed eye
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️'; // Open eye
            }
        }

        // Show Message
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 3000);
            }
        }

        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalText = btn.textContent;

            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div> AUTENTICANDO...';

            const formData = new FormData(e.target);
            const data = {
                cpf: formData.get('cpf'), // Using existing backend field name
                senha: formData.get('senha')
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('Login realizado com sucesso! Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.href = '/votacao';
                    }, 1000);
                } else {
                    showMessage(result.error || 'Credenciais inválidas', 'error');
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('Erro de conexão. Tente novamente.', 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        // Função para formatar CPF
        function formatarCPF(input) {
            // Remove tudo que não é dígito
            let value = input.value.replace(/\D/g, '');

            // Limita em 11 dígitos
            if (value.length > 11) {
                value = value.slice(0, 11);
            }

            // Adiciona a máscara do CPF: XXX.XXX.XXX-XX
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            }

            // Atualiza o valor no input
            input.value = value;
        }
    </script>
</body>

</html>
