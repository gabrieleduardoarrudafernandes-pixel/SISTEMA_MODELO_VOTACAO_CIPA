<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votação - Sistema de Votação CIPA</title>
    <link rel="icon" type="image/jpeg" href="cipa.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('4.jpg') center/cover fixed no-repeat,
                linear-gradient(135deg, rgba(20, 20, 20, 0.95) 0%, rgba(60, 60, 60, 0.85) 40%, rgba(45, 55, 65, 0.75) 100%);
            min-height: 100vh;
            padding: 20px;
            background-blend-mode: overlay;
        }

        .header {
            background: linear-gradient(135deg, rgba(45, 55, 65, 0.95) 0%, rgba(25, 25, 30, 0.85) 50%, rgba(15, 15, 15, 0.75) 100%);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 3px rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: white;
            font-size: 2em;
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-welcome {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
        }

        .user-name {
            color: white;
            font-weight: 900;
            font-size: 1.1em;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
        }

        .logout-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 240, 0.7) 100%);
            backdrop-filter: blur(5px);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-shadow: 3px 4px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.9) 0%, rgba(200, 35, 51, 0.7) 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .container {
            background: linear-gradient(135deg, rgba(45, 55, 65, 0.95) 0%, rgba(25, 25, 30, 0.85) 50%, rgba(15, 15, 15, 0.75) 100%);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 3px rgba(255, 255, 255, 0.1);
            padding: 30px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            animation: fadeIn 0.8s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
        }

        .tab.active {
            color: white;
            border-bottom-color: white;
        }

        .tab:hover {
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .candidate-card {
            background: linear-gradient(135deg, rgba(45, 55, 65, 0.95) 0%, rgba(25, 25, 30, 0.85) 50%, rgba(15, 15, 15, 0.75) 100%);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .candidate-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        .candidate-card:hover::before {
            left: 100%;
        }

        .candidate-card:not(.voted):hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            border-color: white;
            transition: all 0.2s ease;
        }

        .candidate-card:not(.voted):hover .vote-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(245, 245, 245, 0.9) 100%);
            transform: scale(1.01);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .candidate-card.voted {
            background: linear-gradient(135deg, rgba(45, 55, 65, 0.95) 0%, rgba(25, 25, 30, 0.85) 50%, rgba(15, 15, 15, 0.75) 100%);
            border-color: rgba(255, 255, 255, 0.3);
            transform: none !important;
        }

        .candidate-card.voted:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .candidate-info h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 1.3em;
            font-weight: 600;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
        }

        .candidate-info p {
            color: rgba(255, 255, 255, 0.8);
            margin: 8px 0;
            font-size: 0.95em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .vote-count {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 240, 0.7) 100%);
            backdrop-filter: blur(5px);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 15px;
            display: inline-block;
            font-size: 0.9em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .vote-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 240, 0.7) 100%);
            backdrop-filter: blur(5px);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
            width: 100%;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-shadow: 3px 4px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        .vote-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
        }

        .vote-btn:disabled {
            background: linear-gradient(135deg, rgba(108, 117, 125, 0.9) 0%, rgba(108, 117, 125, 0.7) 100%);
            cursor: not-allowed;
            transform: scale(1);
        }

        .vote-btn.voted {
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.9) 0%, rgba(32, 201, 151, 0.8) 100%);
        }

        .candidate-card.voted {
            border: 2px solid rgba(40, 167, 69, 0.7);
            background: linear-gradient(135deg, rgba(212, 237, 218, 0.9) 0%, rgba(195, 230, 203, 0.8) 100%);
            position: relative;
        }

        .candidate-card.voted::before {
            content: '✅';
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 240, 0.7) 100%);
            color: rgba(45, 55, 65, 0.9);
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        .candidate-card.voted .vote-count {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 240, 0.7) 100%);
            color: rgba(45, 55, 65, 0.9);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        .message {
            background: linear-gradient(135deg, rgba(212, 237, 218, 0.9) 0%, rgba(195, 230, 203, 0.8) 100%);
            backdrop-filter: blur(5px);
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(195, 230, 203, 0.5);
            display: none;
            animation: slideIn 0.3s ease;
        }

        .error {
            background: linear-gradient(135deg, rgba(248, 215, 218, 0.9) 0%, rgba(245, 198, 203, 0.8) 100%);
            backdrop-filter: blur(5px);
            color: #721c24;
            border-color: rgba(245, 198, 203, 0.5);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .vote-confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .vote-confirm-dialog {
            background: linear-gradient(135deg, rgba(45, 55, 65, 0.95) 0%, rgba(25, 25, 30, 0.85) 50%, rgba(15, 15, 15, 0.75) 100%);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            animation: bounceIn 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            60% {
                opacity: 1;
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .vote-confirm-dialog h3 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
        }

        .vote-confirm-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        .confirm-btn, .cancel-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .confirm-btn {
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.9) 0%, rgba(32, 201, 151, 0.8) 100%);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(40, 167, 69, 0.5);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        .cancel-btn {
            background: linear-gradient(135deg, rgba(108, 117, 125, 0.9) 0%, rgba(108, 117, 125, 0.7) 100%);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(108, 117, 125, 0.5);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        .confirm-btn:hover, .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .user-info {
                flex-direction: column;
                gap: 10px;
            }

            .candidates-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab {
                text-align: center;
                border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="header" style="display: flex; align-items: center;">
        <div style="width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #6d6d6d 0%, #909090 50%, #a9a9a9 100%); padding: 5px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4); margin-right: 20px;">
            <img src="cipa.jpg" alt="CIPA" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>
        <h1>Sistema de Votação CIPA</h1>
        <div class="user-info">
            <div class="user-welcome">
                Bem-vindo, <span class="user-name" id="userName">Carregando...</span>
            </div>
            <button class="logout-btn" onclick="logout()">SAIR</button>
        </div>
    </div>

    <div class="container">
        <div id="message" class="message"></div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('voting')">🗳️ VOTAÇÃO</button>
        </div>

        <div id="voting" class="tab-content active">
            <div class="loading" id="loading">Carregando candidatos...</div>
            <div class="candidates-grid" id="candidates"></div>
        </div>
    </div>

    <!-- Confirmação de voto -->
    <div class="vote-confirm-overlay" id="voteConfirm">
        <div class="vote-confirm-dialog">
            <h3>Confirmar Voto</h3>
            <p>Tem certeza que deseja votar em <strong id="candidateName"></strong>?</p>
            <div class="vote-confirm-buttons">
                <button class="confirm-btn" onclick="confirmVote()">Confirmar</button>
                <button class="cancel-btn" onclick="cancelVote()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let candidates = [];
        let currentUser = null;
        let selectedCandidate = null;
        let filteredCandidates = [];
        let userHasVoted = false;
        let votingDisabled = false;

        // Verificar autenticação
        async function checkAuth() {
            try {
                const userResponse = await fetch('/api/user');

                if (userResponse.ok) {
                    currentUser = await userResponse.json();
                    document.getElementById('userName').textContent = currentUser.nomfun;
                    userHasVoted = false;
                    votingDisabled = false;
                    loadCandidates();
                } else {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Erro ao verificar autenticação:', error);
                window.location.href = '/login';
            }
        }

        // Logout
        async function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                try {
                    await fetch('/api/logout', { method: 'POST' });
                    window.location.href = '/login';
                } catch (error) {
                    console.error('Erro ao fazer logout:', error);
                    window.location.href = '/login';
                }
            }
        }

        // Função de navegação de abas (apenas votação)
        function showTab(tabName) {
            // Apenas uma aba disponível, mantém a ativa
            document.getElementById('voting').classList.add('active');
        }

        // Mostrar mensagem
        function showMessage(text, isError = false) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = isError ? 'message error' : 'message';
            messageEl.style.display = 'block';

            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        // Carregar candidatos
        async function loadCandidates() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('candidates').innerHTML = '';

                // Usar a API que retorna apenas candidatos ativos
                const response = await fetch('/api/candidatos');
                const candidates = await response.json();

                filteredCandidates = candidates;

                // MARCAR O CANDIDATO VOTADO PELO USUÁRIO
                if (userHasVoted) {
                    // Se o usuário já votou, encontrar qual candidato ele votou
                    const votesFileResponse = await fetch('/api/votos-eleitor');
                    if (votesFileResponse.ok) {
                        const voteData = await votesFileResponse.json();

                        if (voteData.voto_registrado) {
                            // Marcar o candidato votado
                            filteredCandidates.forEach(candidate => {
                                candidate.userVote = (candidate.numcad === voteData.candidato_numcad);
                            });
                        }
                    }
                }

                // Ocultar loading
                document.getElementById('loading').style.display = 'none';

                // Renderizar candidatos
                renderCandidates();

                // Mostrar mensagem especial se usuário já votou
                if (userHasVoted) {
                    const votingSection = document.getElementById('voting');
                    const warningDiv = document.createElement('div');
                    warningDiv.className = 'vote-warning';
                    warningDiv.innerHTML = `
                        <div style="text-align: center; margin-bottom: 20px; padding: 15px; background: rgba(255, 243, 205, 0.9); border: 2px solid rgba(255, 234, 167, 0.5); border-radius: 10px;">
                            <h3 style="color: rgba(133, 100, 4, 0.95); margin-bottom: 10px;">⚠️ ATENÇÃO</h3>
                            <p style="color: rgba(133, 100, 4, 0.95); margin: 0;">
                                <strong>Você já registrou seu voto!</strong><br>
                                Cada eleitor pode votar apenas <strong>uma única vez</strong>.<br>
                                <small>O candidato em que você votou está marcado com ✅ abaixo.</small>
                            </p>
                        </div>
                    `;
                    votingSection.insertBefore(warningDiv, votingSection.firstChild);
                }

            } catch (error) {
                console.error('Erro ao carregar candidatos:', error);
                document.getElementById('loading').innerHTML = 'Erro ao carregar candidatos. Tente novamente mais tarde.';
            }
        }

        // Renderizar candidatos
        function renderCandidates() {
            const candidatesGrid = document.getElementById('candidates');
            candidatesGrid.innerHTML = '';

            if (filteredCandidates.length === 0) {
                candidatesGrid.innerHTML = '<div class="loading">Nenhum candidato encontrado.</div>';
                return;
            }

            const totalVotos = Math.max(...filteredCandidates.map(c => c.voto), 1);

            filteredCandidates.forEach((candidate, index) => {
                const card = document.createElement('div');
                card.className = 'candidate-card';

                // Determinar badges de popularidade
                let popularityBadge = '';
                if (candidate.voto > 0 && index < 3) {
                    const badges = ['🥇', '🥈', '🥉'];
                    const badgeClasses = ['lead', 'second', 'third'];
                    popularityBadge = `<div class="popularity-badge ${badgeClasses[index]}">${badges[index]}</div>`;
                }

                // Determinar estado do botão baseado no status de voto
                let buttonHtml = '';
                if (userHasVoted) {
                    // Se usuário já votou, mostrar quem ele votou
                    const votedCandidate = filteredCandidates.find(c => c.userVote);
                    const userVote = votedCandidate && votedCandidate.userVote;

                    if (userVote) {
                        // Este é o candidato em que o usuário votou
                        buttonHtml = `
                            <button class="vote-btn voted" disabled title="Você votou neste candidato!">
                                ✅ Seu Voto Registrado
                            </button>
                        `;
                        card.classList.add('voted');
                    } else {
                        // Candidato em que o usuário não votou
                        buttonHtml = `
                            <button class="vote-btn" disabled title="Você já votou em outro candidato">
                                ❌ Já Votou
                            </button>
                        `;
                    }
                } else {
                    // Usuário ainda não votou, permitir votação
                    buttonHtml = `
                        <button class="vote-btn"
                                onclick="showVoteConfirm('${candidate.numcad}', '${candidate.nomfun.replace(/'/g, "\\'")}')"
                                title="Votar em ${candidate.nomfun}">
                            🗳️ Votar
                        </button>
                    `;
                }

                card.innerHTML = `
                    ${popularityBadge}
                    <div class="candidate-info">
                        <h3>${candidate.nomfun}</h3>
                        <p><strong>Matrícula:</strong> ${candidate.numcad}</p>
                        ${candidate.numcpf ? `<p><strong>CPF:</strong> ${formatCPF(candidate.numcpf)}</p>` : ''}
                        ${candidate.titcar ? `<p><strong>Cargo:</strong> ${candidate.titcar}</p>` : ''}
                        ${candidate.datnas ? `<p><strong>Data Nascimento:</strong> ${new Date(candidate.datnas).toLocaleDateString('pt-BR')}</p>` : ''}
                        ${candidate.datadm ? `<p><strong>Data Admissão:</strong> ${new Date(candidate.datadm).toLocaleDateString('pt-BR')}</p>` : ''}

                        <div class="vote-count">
                            <strong>${candidate.voto} voto${candidate.voto !== 1 ? 's' : ''}</strong>
                            ${candidate.voto > 0 ? `<span style="color: rgba(40, 167, 69, 0.9);">🏆</span>` : '<span style="color: rgba(255, 255, 255, 0.7);">🗳️</span>'}
                        </div>
                    </div>
                    ${buttonHtml}
                `;
                candidatesGrid.appendChild(card);
            });
        }

        // Formatar CPF
        function formatCPF(cpf) {
            if (!cpf) return '';
            return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        }

        // Mostrar confirmação de voto
        function showVoteConfirm(numcad, nomfun) {
            selectedCandidate = { numcad, nomfun };
            document.getElementById('candidateName').textContent = nomfun;
            document.getElementById('voteConfirm').style.display = 'flex';
        }

        // Confirmar voto
        async function confirmVote() {
            if (!selectedCandidate) return;

            // VALIDAÇÃO: Impedir múltiplos cliques
            if (votingDisabled) {
                showMessage('⏳ Processando seu voto, aguarde...', true);
                cancelVote();
                return;
            }

            votingDisabled = true;

            try {
                const response = await fetch('/api/votar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ numcad: selectedCandidate.numcad })
                });

                const result = await response.json();

                if (result.success) {
                    // SUCESSO: Voto registrado
                    showMessage(`✅ Voto em ${selectedCandidate.nomfun} registrado com sucesso!`);

                    // Atualizar status do usuário
                    userHasVoted = true;
                    votingDisabled = true;

                    // Recarregar lista para mostrar o estado atualizado
                    setTimeout(() => {
                        loadCandidates();
                    }, 500);
                } else if (result.ja_votou) {
                    // ERRO: Usuário já votou
                    showMessage('❌ VOTO JÁ REGISTRADO! Você já votou anteriormente. Cada eleitor pode votar apenas uma vez.', true);
                    userHasVoted = true;
                    votingDisabled = true;
                    loadCandidates();
                } else {
                    // Outros erros
                    showMessage(result.error || 'Erro ao registrar voto', true);
                }
            } catch (error) {
                console.error('Erro ao votar:', error);
                showMessage('Erro ao registrar voto. Tente novamente.', true);
            } finally {
                votingDisabled = false;
                cancelVote();
            }
        }

        // Cancelar voto
        function cancelVote() {
            document.getElementById('voteConfirm').style.display = 'none';
            selectedCandidate = null;
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });

        // Fechar diálogo ao clicar fora
        document.getElementById('voteConfirm').addEventListener('click', function(e) {
            if (e.target === this) {
                cancelVote();
            }
        });
    </script>
</body>
</html>
